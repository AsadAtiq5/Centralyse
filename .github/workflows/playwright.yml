name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      # Test-environment values (non-AWS). Test account on a dev environment.
      BASE_URL: https://secure.cygovdev.com/
      USER_EMAIL: ef87da46-128e-49ed-90f0-bfbde069ba16@mailinator.com
      USER_PASSWORD: Test1234567@
      INVALID_USER_EMAIL: test@test.com
      INVALID_USER_PASSWORD: tesr
      INCORRECT_OTP: "123456"
      MAILINATOR_ADDRESS: ef87da46-128e-49ed-90f0-bfbde069ba16
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests (sequential suite)
        run: npx playwright test --config=playwright.sequence.config.ts
      - name: Upload Markdown summary
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-summary-md
          path: test-results/test-summary.md
          retention-days: 30
      - name: Upload HTML report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
